name: Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (v1.0.0, v1.2.3, etc.)

env:
  GO_VERSION: '1.24'
  REGISTRY: ghcr.io
  NETMON_IMAGE: ${{ github.repository }}
  CONNTRACK_IMAGE: ${{ github.repository }}/conntrack

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # =====================
  # Validate Tag
  # =====================
  validate:
    name: Validate Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Validate version tag
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "version=${TAG}" >> $GITHUB_OUTPUT

          # Check if prerelease (contains -alpha, -beta, -rc)
          if [[ "$TAG" =~ -(alpha|beta|rc) ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

  # =====================
  # Build eBPF Programs
  # =====================
  build-ebpf:
    name: Build eBPF
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install eBPF dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm libbpf-dev linux-headers-$(uname -r)

      - name: Build eBPF programs
        run: |
          make -C bpf all

      - name: Upload eBPF artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ebpf-programs
          path: bpf/*.o
          retention-days: 1

  # =====================
  # Build Binaries
  # =====================
  build:
    name: Build ${{ matrix.app }}-${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    needs: [validate]
    strategy:
      matrix:
        app: [netmon, conntrack]
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download eBPF artifacts (conntrack only)
        if: matrix.app == 'conntrack'
        uses: actions/download-artifact@v4
        with:
          name: ebpf-programs
          path: bpf/

      - name: Build binary
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} CGO_ENABLED=0 \
            go build -ldflags="-s -w \
              -X main.Version=${VERSION} \
              -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
              -X main.GitCommit=$(git rev-parse --short HEAD)" \
            -o ${{ matrix.app }}-${{ matrix.os }}-${{ matrix.arch }} ./cmd/${{ matrix.app }}

      - name: Create checksum
        run: |
          sha256sum ${{ matrix.app }}-${{ matrix.os }}-${{ matrix.arch }} > ${{ matrix.app }}-${{ matrix.os }}-${{ matrix.arch }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            ${{ matrix.app }}-${{ matrix.os }}-${{ matrix.arch }}
            ${{ matrix.app }}-${{ matrix.os }}-${{ matrix.arch }}.sha256
          retention-days: 1

  # =====================
  # Build Docker Images
  # =====================
  docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [validate, build]
    strategy:
      matrix:
        app: [netmon, conntrack]
        platform:
          - linux/amd64
          - linux/arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download eBPF artifacts
        uses: actions/download-artifact@v4
        with:
          name: ebpf-programs
          path: bpf/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.app }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !needs.validate.outputs.prerelease }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.app }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ needs.validate.outputs.version }}

  # =====================
  # Create Release
  # =====================
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [validate, build, docker]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare release assets
        run: |
          cd artifacts
          # Flatten structure
          find . -type f -exec mv {} . \;
          find . -type d -empty -delete
          find . -type d -delete
          
          # Create combined checksums file
          sha256sum * > checksums.txt || true
          ls -la

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configuration: |
            {
              "categories": [
                {
                  "title": "🚀 Features",
                  "labels": ["feature", "enhancement"]
                },
                {
                  "title": "🐛 Bug Fixes",
                  "labels": ["bug", "fix"]
                },
                {
                  "title": "📝 Documentation",
                  "labels": ["documentation"]
                },
                {
                  "title": "🔧 Maintenance",
                  "labels": ["chore", "refactor"]
                }
              ],
              "ignore_labels": ["skip-changelog"]
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ needs.validate.outputs.version }}
          body: |
            ${{ steps.changelog.outputs.changelog }}

            ## 📦 Installation

            ### Netmon (TCP Loss Monitoring)

            #### Linux (amd64)
            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ needs.validate.outputs.version }}/netmon-linux-amd64
            chmod +x netmon-linux-amd64
            sudo mv netmon-linux-amd64 /usr/local/bin/netmon
            ```

            #### Linux (arm64)
            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ needs.validate.outputs.version }}/netmon-linux-arm64
            chmod +x netmon-linux-arm64
            sudo mv netmon-linux-arm64 /usr/local/bin/netmon
            ```

            ### Conntrack (Connection Tracking)

            #### Linux (amd64)
            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ needs.validate.outputs.version }}/conntrack-linux-amd64
            chmod +x conntrack-linux-amd64
            sudo mv conntrack-linux-amd64 /usr/local/bin/conntrack
            ```

            #### Linux (arm64)
            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ needs.validate.outputs.version }}/conntrack-linux-arm64
            chmod +x conntrack-linux-arm64
            sudo mv conntrack-linux-arm64 /usr/local/bin/conntrack
            ```

            ### Docker

            #### Netmon
            ```bash
            docker pull ghcr.io/${{ github.repository }}/netmon:${{ needs.validate.outputs.version }}
            ```

            #### Conntrack
            ```bash
            docker pull ghcr.io/${{ github.repository }}/conntrack:${{ needs.validate.outputs.version }}
            ```

            ## 🔍 Verify Checksums

            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ needs.validate.outputs.version }}/checksums.txt
            sha256sum -c checksums.txt
            ```

            ## 📖 Documentation

            - [README](https://github.com/${{ github.repository }}/blob/main/README.md)
            - [Status & Plan](https://github.com/${{ github.repository }}/blob/main/docs/STATUS_AND_PLAN.md)
            - [Discovery API](https://github.com/${{ github.repository }}/blob/main/docs/DISCOVERY_API.md)
            - [Conntrack Guide](https://github.com/${{ github.repository }}/blob/main/docs/CONNTRACK.md)

            ---

            **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ github.event.release.tag_name }}...${{ needs.validate.outputs.version }}
          draft: false
          prerelease: ${{ needs.validate.outputs.prerelease == 'true' }}
          files: |
            artifacts/netmon-*
            artifacts/conntrack-*
            artifacts/checksums.txt
          token: ${{ secrets.GITHUB_TOKEN }}

  # =====================
  # Notify
  # =====================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [release, docker]
    if: always()
    steps:
      - name: Check release status
        run: |
          if [[ "${{ needs.release.result }}" == "success" && "${{ needs.docker.result }}" == "success" ]]; then
            echo "✅ Release published successfully!"
            echo "📦 https://github.com/${{ github.repository }}/releases"
            echo "🐳 ghcr.io/${{ github.repository }}:${{ needs.validate.outputs.version }}"
          else
            echo "❌ Release failed"
            echo "Release result: ${{ needs.release.result }}"
            echo "Docker result: ${{ needs.docker.result }}"
            exit 1
          fi
