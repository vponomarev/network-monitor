# Prometheus configuration for Network Monitor
# This configuration scrapes metrics from netmon and conntrack applications

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'network-monitor'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Rule files (optional)
# rule_files:
#   - "alerts/*.yml"

scrape_configs:
  # =============================================================================
  # Network Monitor (netmon)
  # =============================================================================
  - job_name: 'netmon'
    static_configs:
      - targets: ['localhost:9876']
        labels:
          application: 'netmon'
          component: 'monitoring'
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s

  # =============================================================================
  # Connection Tracker (conntrack)
  # =============================================================================
  - job_name: 'conntrack'
    static_configs:
      - targets: ['localhost:9876']
        labels:
          application: 'conntrack'
          component: 'tracking'
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s

  # =============================================================================
  # Prometheus self-monitoring (optional)
  # =============================================================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          application: 'prometheus'
          component: 'metrics'
    scrape_interval: 15s

  # =============================================================================
  # Node Exporter (optional - for system metrics)
