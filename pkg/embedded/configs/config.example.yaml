# Connection Tracker (conntrack) configuration file
# This is a sample configuration for eBPF-based connection tracking

# Logging configuration
logging:
  # Log level: debug, info, warn, error
  level: info
  # Log format: json, console
  format: console

# Connection tracking configuration
connections:
  # Track incoming connections (accepted sockets)
  track_incoming: true
  
  # Track outgoing connections (connect() calls)
  track_outgoing: true
  
  # Track connection closes (TCP close events)
  track_closes: true
  
  # Optional: filter by ports (empty = track all ports)
  # filter_ports:
  #   - 22    # SSH
  #   - 80    # HTTP
  #   - 443   # HTTPS

# Syslog configuration (optional)
# If not specified, logs go to stdout/stderr
# syslog:
#   # Network type: empty (local), udp, tcp
#   network: udp
#   # Remote syslog address (e.g., localhost:514)
#   address: localhost:514
#   # Tag/program name for syslog messages
#   tag: conntrack
#   # Syslog facility: LOCAL0-7, USER, DAEMON
#   facility: LOCAL0
#   # Include hostname in messages
#   include_hostname: true

# SYN timeout configuration
# Timeout for waiting SYN+ACK response on outgoing connections
syn_timeout: 30s
